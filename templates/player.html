<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Watch - CineStream</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --accent: #e50914;
    --text: #f0f0f0;
    --muted: #888;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 0 2.5rem;
    height: 64px;
    background: var(--surface);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-decoration: none;
    flex-shrink: 0;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 0.875rem;
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
    flex-shrink: 0;
    padding: 0;
  }
  .back-btn:hover { color: #fff; }
  .nav-title {
    font-size: 0.95rem;
    font-weight: 500;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* PLAYER */
  .player-section { background: #000; }
  .player-wrap {
    max-width: 1200px;
    margin: 0 auto;
    aspect-ratio: 16/9;
    position: relative;
  }
  .player-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .player-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    background: #000;
  }

  /* CLICK-TO-PLAY OVERLAY */
  .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: rgba(0,0,0,0.72);
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s;
  }
  .play-overlay:hover { background: rgba(0,0,0,0.55); }
  .play-overlay .big-play {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    box-shadow: 0 0 40px rgba(229,9,20,0.5);
    transition: transform 0.15s;
  }
  .play-overlay:hover .big-play { transform: scale(1.1); }
  .play-overlay p { color: #ccc; font-size: 0.85rem; }

  /* BLACK-SCREEN NOTICE */
  .black-notice {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.88);
    color: #ccc;
    font-size: 0.8rem;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    z-index: 11;
    flex-wrap: wrap;
  }
  .black-notice button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 14px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.78rem;
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* SOURCE BAR */
  .source-bar {
    background: var(--surface);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 10px 2.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .source-bar::-webkit-scrollbar { display: none; }
  .bar-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .source-btn {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: #ccc;
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .source-btn:hover { border-color: var(--accent); color: #fff; }
  .source-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* EPISODE BAR */
  .episode-bar {
    background: var(--surface);
    padding: 10px 2.5rem;
    display: none;
    align-items: center;
    gap: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-wrap: wrap;
  }
  .ep-select {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    outline: none;
    max-width: 280px;
  }
  .ep-select option { background: var(--surface2); }

  /* CONTENT GRID */
  .content-area {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 2rem 5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  /* MOVIE INFO */
  .info-top {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .poster-thumb {
    width: 120px;
    height: 180px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .info-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 1px;
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  .info-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 0.75rem;
  }
  .meta-pill {
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 0.78rem;
    color: #ccc;
  }
  .meta-pill.gold { border-color: #f5c518; color: #f5c518; }
  .info-tagline {
    font-style: italic;
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 0.75rem;
  }
  .info-overview {
    font-size: 0.9rem;
    line-height: 1.7;
    color: #ccc;
    margin-bottom: 1.25rem;
  }
  .genre-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.5rem;
  }
  .genre-tag {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    font-size: 0.78rem;
    color: #ccc;
  }
  .info-row {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .info-col label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .info-col span { font-size: 0.88rem; font-weight: 500; }

  /* CAST */
  .section-heading {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-heading::before {
    content: '';
    display: block;
    width: 3px;
    height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }
  .cast-row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .cast-row::-webkit-scrollbar { display: none; }
  .cast-card { flex-shrink: 0; width: 76px; text-align: center; }
  .cast-img {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--surface2);
    display: block;
    margin: 0 auto 6px;
  }
  .cast-name { font-size: 0.71rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cast-char { font-size: 0.65rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* MORE LIKE THIS — horizontal row */
  .similar-row {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  .similar-row::-webkit-scrollbar { height: 5px; }
  .similar-row::-webkit-scrollbar-track { background: transparent; }
  .similar-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .related-card {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    flex-shrink: 0;
    width: 130px;
    transition: transform 0.18s, opacity 0.18s;
  }
  .related-card:hover { transform: translateY(-4px); opacity: 0.85; }
  .related-card:hover .related-title { color: var(--accent); }
  .related-thumb {
    width: 130px;
    height: 195px;
    object-fit: cover;
    border-radius: 8px;
    flex-shrink: 0;
    background: var(--surface2);
    margin-bottom: 8px;
    display: block;
  }
  .related-title {
    font-size: 0.8rem;
    font-weight: 500;
    margin-bottom: 3px;
    transition: color 0.2s;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.3;
  }
  .related-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 2px; }
  .related-rating { font-size: 0.72rem; color: #f5c518; }

  /* SPINNER / ERROR */
  .spinner {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
    min-height: 200px;
  }
  .spinner::after {
    content: '';
    width: 36px;
    height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--muted);
  }
  .error-state h2 { font-size: 1.4rem; color: #fff; margin-bottom: 1rem; }
  .error-state a { color: var(--accent); text-decoration: none; }
  .error-state a:hover { text-decoration: underline; }

  @media (max-width: 900px) {
    .content-area { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    .source-bar, .episode-bar { padding: 10px 1rem; }
    .content-area { padding: 1.5rem 1rem 3rem; }
    .info-top { flex-direction: column; }
    .related-card { width: 110px; }
    .related-thumb { width: 110px; height: 165px; }
  }
</style>

<!-- ── AD BLOCKER STYLES ───────────────────────────────────────────────── -->
<style>
  /* Shield badge shown in source bar */
  .adblock-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: #4ade80;
    font-weight: 600;
    letter-spacing: 0.4px;
    flex-shrink: 0;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid rgba(74,222,128,0.3);
    background: rgba(74,222,128,0.07);
    white-space: nowrap;
  }
  .adblock-badge span { font-size: 0.9rem; }

  /* Invisible click-trap layer over the iframe — catches ad clicks before they fire */
  #adClickTrap {
    position: absolute;
    inset: 0;
    z-index: 5;
    cursor: pointer;
    background: transparent;
  }

  /* Toast notification */
  #adToast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(20,20,30,0.95);
    color: #4ade80;
    border: 1px solid rgba(74,222,128,0.35);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 0.8rem;
    font-weight: 500;
    z-index: 9999;
    pointer-events: none;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    white-space: nowrap;
  }
  #adToast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">CineStream</a>
  <!-- FIX: falls back to home if there's no history (e.g. direct link / new tab) -->
  <button class="back-btn" onclick="goBack()" aria-label="Go back">&#8592; Back</button>
  <div class="nav-title" id="navTitle">Loading&hellip;</div>
</nav>

<!-- PLAYER -->
<div class="player-section">
  <div class="player-wrap" id="playerWrap">
    <div class="player-placeholder"><div class="spinner"></div></div>
    <!-- Ad click trap: sits over iframe, passes real play-clicks through, swallows ad redirects -->
    <div id="adClickTrap" onclick="handlePlayerClick(event)" title="Click to play"></div>
  </div>
</div>

<!-- Ad blocked toast -->
<div id="adToast">🛡️ Ad blocked</div>

<!-- SOURCE SWITCHER -->
<div class="source-bar" id="sourceBar">
  <span class="bar-label">Server:</span>
  <div class="adblock-badge" id="adblockBadge"><span>🛡️</span> Ad Blocker: <span id="adBlockCount">0</span> blocked</div>
</div>

<!-- TV EPISODE SELECTOR -->
<div class="episode-bar" id="episodeBar">
  <span class="bar-label">Season:</span>
  <select class="ep-select" id="seasonSel" onchange="onSeasonChange()" aria-label="Select season"></select>
  <span class="bar-label">Episode:</span>
  <select class="ep-select" id="episodeSel" onchange="onEpisodeChange()" aria-label="Select episode"></select>
</div>

<!-- INFO + SIDEBAR -->
<div class="content-area" id="contentArea" style="display:none">
  <div id="movieInfo"></div>
  <div class="sidebar" id="sidebar"></div>
</div>

<script>
  const IMG = 'https://image.tmdb.org/t/p/';
  const urlParams  = new URLSearchParams(window.location.search);
  const MEDIA_ID   = urlParams.get('id');
  const MEDIA_TYPE = urlParams.get('type') || 'movie';

  let currentSource  = 0;
  let currentSeason  = 1;
  let currentEpisode = 1;
  let blackScreenTimer = null;

  // FIX: safe back navigation — if there's no history go home instead of doing nothing
  function goBack() {
    if (window.history.length > 1) {
      history.back();
    } else {
      window.location.href = '/';
    }
  }

  // ── Embed sources ─────────────────────────────────────────────────────────
  // Multiple servers so users can switch if one is down or blocked
  const SOURCES = {
    movie: [
      { name: 'Server 1', url: id        => `https://www.vidking.net/embed/movie/${id}?color=ff0000` },
      { name: 'Server 2', url: id        => `https://vidsrc.to/embed/movie/${id}` },
      { name: 'Server 3', url: id        => `https://www.2embed.cc/embed/${id}` },
    ],
    tv: [
      { name: 'Server 1', url: (id,s,e) => `https://www.vidking.net/embed/tv/${id}/${s}/${e}?color=ff0000&episodeSelector=true` },
      { name: 'Server 2', url: (id,s,e) => `https://vidsrc.to/embed/tv/${id}/${s}/${e}` },
      { name: 'Server 3', url: (id,s,e) => `https://www.2embed.cc/embedtv/${id}&s=${s}&e=${e}` },
    ],
  };

  // ── Proxy fetch (with retry) ──────────────────────────────────────────────
  async function tmdb(path, extra = {}, retries = 2) {
    const p = new URLSearchParams({ path, ...extra });
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const r = await fetch(`/api/tmdb?${p}`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        if (data.error) throw new Error(data.error);
        return data;
      } catch (err) {
        if (attempt === retries) throw err;
        await new Promise(res => setTimeout(res, 600 * (attempt + 1)));
      }
    }
  }

  function imgUrl(p, size = 'w342') {
    return p ? `${IMG}${size}${p}` : 'https://placehold.co/120x180/1c1c26/555?text=?';
  }

  // ── Player ────────────────────────────────────────────────────────────────
  function loadPlayer() {
    clearTimeout(blackScreenTimer);

    const sourceList = SOURCES[MEDIA_TYPE];
    // Guard: clamp currentSource in case list changed
    currentSource = Math.max(0, Math.min(currentSource, sourceList.length - 1));

    const src = MEDIA_TYPE === 'movie'
      ? sourceList[currentSource].url(MEDIA_ID)
      : sourceList[currentSource].url(MEDIA_ID, currentSeason, currentEpisode);

    const sourceName = sourceList[currentSource].name;
    const hasNext    = sourceList.length > 1;
    const nextIndex  = (currentSource + 1) % sourceList.length;
    const nextName   = sourceList[nextIndex].name;

    const wrap = document.getElementById('playerWrap');
    wrap.innerHTML = '<iframe id="playerIframe" src="' + src + '" allowfullscreen ' +
      'allow="autoplay; fullscreen; picture-in-picture; encrypted-media; web-share" ' +
      'referrerpolicy="no-referrer-when-downgrade"></iframe>';
  }

  function dismissOverlay() {
    document.getElementById('playOverlay')?.remove();
  }

  function switchToNextSource() {
    currentSource = (currentSource + 1) % SOURCES[MEDIA_TYPE].length;
    document.querySelectorAll('.source-btn').forEach((b, j) =>
      b.classList.toggle('active', j === currentSource)
    );
    loadPlayer();
  }

  function buildSourceBar() {
    const bar      = document.getElementById('sourceBar');
    const fragment = document.createDocumentFragment();
    SOURCES[MEDIA_TYPE].forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'source-btn' + (i === 0 ? ' active' : '');
      btn.textContent = s.name;
      btn.setAttribute('aria-label', `Switch to ${s.name}`);
      btn.onclick = () => {
        currentSource = i;
        bar.querySelectorAll('.source-btn').forEach((b, j) =>
          b.classList.toggle('active', j === i)
        );
        loadPlayer();
      };
      fragment.appendChild(btn);
    });
    bar.appendChild(fragment);
  }

  // ── TV season/episode ─────────────────────────────────────────────────────
  async function buildEpisodeBar(seasons) {
    const validSeasons = seasons.filter(s => s.season_number > 0);
    if (!validSeasons.length) return;

    const bar = document.getElementById('episodeBar');
    bar.style.display = 'flex';

    document.getElementById('seasonSel').innerHTML = validSeasons.map(s =>
      `<option value="${s.season_number}">Season ${s.season_number}</option>`
    ).join('');

    await fetchEpisodes(validSeasons[0].season_number, true);
  }

  async function fetchEpisodes(seasonNum, autoPlay = false) {
    currentSeason = seasonNum;
    try {
      const data = await tmdb(`/tv/${MEDIA_ID}/season/${seasonNum}`);
      const eps = data.episodes || [];
      if (!eps.length) throw new Error('No episodes found');
      document.getElementById('episodeSel').innerHTML = eps.map(e =>
        `<option value="${e.episode_number}">Ep ${e.episode_number} &ndash; ${e.name}</option>`
      ).join('');
      currentEpisode = eps[0].episode_number;
      if (autoPlay) loadPlayer();
    } catch (err) {
      console.error('Failed to load episodes:', err);
      document.getElementById('episodeSel').innerHTML =
        '<option disabled>Could not load episodes</option>';
    }
  }

  async function onSeasonChange() {
    const s = parseInt(document.getElementById('seasonSel').value, 10);
    await fetchEpisodes(s, true);
  }

  function onEpisodeChange() {
    currentEpisode = parseInt(document.getElementById('episodeSel').value, 10);
    loadPlayer();
  }

  // ── Info panel ────────────────────────────────────────────────────────────
  function renderInfo(d, credits) {
    const cast    = (credits.cast  || []).slice(0, 16);
    const genres  = d.genres || [];
    const title   = d.title || d.name || '';
    const year    = (d.release_date || d.first_air_date || '').slice(0, 4);
    const rating  = d.vote_average ? d.vote_average.toFixed(1) : 'N/A';
    const votes   = d.vote_count ? d.vote_count.toLocaleString() : '';
    const runtime = d.runtime
      ? `${Math.floor(d.runtime / 60)}h ${d.runtime % 60}m`
      : d.episode_run_time?.[0] ? `~${d.episode_run_time[0]}m / ep` : '';
    const director = (credits.crew || []).find(c => c.job === 'Director');

    document.getElementById('movieInfo').innerHTML = `
      <div class="info-top">
        <img class="poster-thumb" src="${imgUrl(d.poster_path, 'w342')}" alt="${title} poster" />
        <div>
          <h1 class="info-title">${title}</h1>
          ${d.tagline ? `<p class="info-tagline">"${d.tagline}"</p>` : ''}
          <div class="info-meta">
            ${year    ? `<span class="meta-pill">${year}</span>` : ''}
            ${runtime ? `<span class="meta-pill">${runtime}</span>` : ''}
            ${rating !== 'N/A' ? `<span class="meta-pill gold">&#11088; ${rating} (${votes})</span>` : ''}
            ${d.status ? `<span class="meta-pill">${d.status}</span>` : ''}
            ${d.original_language ? `<span class="meta-pill">${d.original_language.toUpperCase()}</span>` : ''}
          </div>
          <div class="genre-tags">
            ${genres.map(g => `<span class="genre-tag">${g.name}</span>`).join('')}
          </div>
        </div>
      </div>

      <p class="info-overview">${d.overview || 'No overview available.'}</p>

      <div class="info-row">
        ${director                ? `<div class="info-col"><label>Director</label><span>${director.name}</span></div>` : ''}
        ${d.number_of_seasons     ? `<div class="info-col"><label>Seasons</label><span>${d.number_of_seasons}</span></div>` : ''}
        ${d.number_of_episodes    ? `<div class="info-col"><label>Episodes</label><span>${d.number_of_episodes}</span></div>` : ''}
        ${d.budget > 0            ? `<div class="info-col"><label>Budget</label><span>$${(d.budget / 1e6).toFixed(0)}M</span></div>` : ''}
        ${d.revenue > 0           ? `<div class="info-col"><label>Revenue</label><span>$${(d.revenue / 1e6).toFixed(0)}M</span></div>` : ''}
      </div>

      ${cast.length ? `
        <div style="margin-bottom:1.5rem">
          <div class="section-heading">Cast</div>
          <div class="cast-row">
            ${cast.map(c => `
              <div class="cast-card">
                <img class="cast-img"
                     src="${c.profile_path ? IMG + 'w92' + c.profile_path : 'https://placehold.co/58x58/1c1c26/555?text=?'}"
                     alt="${c.name}" loading="lazy" />
                <div class="cast-name" title="${c.name}">${c.name}</div>
                <div class="cast-char" title="${c.character}">${c.character}</div>
              </div>`).join('')}
          </div>
        </div>` : ''}
    `;
  }

  function renderSidebar(similar) {
    const items = (similar.results || []).filter(r => r.poster_path).slice(0, 20);
    if (!items.length) { document.getElementById('sidebar').innerHTML = ''; return; }
    document.getElementById('sidebar').innerHTML = `
      <div class="section-heading">More Like This</div>
      <div class="similar-row">
        ${items.map(r => `
          <a class="related-card" href="/player?id=${r.id}&type=${MEDIA_TYPE}">
            <img class="related-thumb" src="${imgUrl(r.poster_path, 'w185')}" alt="${r.title || r.name}" loading="lazy" />
            <div class="related-title">${r.title || r.name}</div>
            <div class="related-meta">${(r.release_date || r.first_air_date || '').slice(0, 4)}</div>
            <div class="related-rating">&#11088; ${r.vote_average?.toFixed(1) || 'N/A'}</div>
          </a>`).join('')}
      </div>
    `;
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  async function init() {
    if (!MEDIA_ID) {
      document.getElementById('playerWrap').innerHTML =
        '<div class="error-state">' +
          '<h2>No content selected</h2>' +
          '<p style="margin-bottom:1.5rem">Please choose something to watch from the home page.</p>' +
          '<a href="/">&#8592; Go back home</a>' +
        '</div>';
      document.getElementById('navTitle').textContent = 'Nothing selected';
      return;
    }

    buildSourceBar();

    // Start the movie player immediately — no need to wait for API metadata
    if (MEDIA_TYPE === 'movie') loadPlayer();

    // Fetch metadata; allSettled so partial failures never crash the page
    const [detailsRes, creditsRes, similarRes] = await Promise.allSettled([
      tmdb('/' + MEDIA_TYPE + '/' + MEDIA_ID,               {}, 4),
      tmdb('/' + MEDIA_TYPE + '/' + MEDIA_ID + '/credits',  {}, 3),
      tmdb('/' + MEDIA_TYPE + '/' + MEDIA_ID + '/similar',  {}, 2),
    ]);

    const val     = r => r.status === 'fulfilled' ? r.value : null;
    const details = val(detailsRes);
    const credits = val(creditsRes) || { cast: [], crew: [] };
    const similar = val(similarRes) || { results: [] };

    if (details) {
      const title = details.title || details.name || 'Watch';
      document.title = `${title} — CineStream`;
      document.getElementById('navTitle').textContent = title;

      if (MEDIA_TYPE === 'tv' && details.seasons) {
        await buildEpisodeBar(details.seasons);
      }

      document.getElementById('contentArea').style.display = 'flex';
      renderInfo(details, credits);
      renderSidebar(similar);
    } else {
      document.getElementById('navTitle').textContent = 'Watch';
      if (MEDIA_TYPE === 'tv') {
        // TV needs season/episode data to play — show a retry prompt
        document.getElementById('playerWrap').innerHTML =
          '<div class="error-state">' +
            '<h2>Could not load show details</h2>' +
            '<p style="margin-bottom:1.5rem">Network was slow or timed out. Please try again.</p>' +
            '<button onclick="init()" style="background:var(--accent);color:#fff;border:none;' +
              'padding:10px 24px;border-radius:8px;cursor:pointer;font-size:0.95rem;font-family:inherit;margin-right:1rem">' +
              '&#8635; Retry' +
            '</button>' +
            '<a href="/">&#8592; Go back home</a>' +
          '</div>';
      } else {
        // Movie player is running — just show a dismissible soft warning
        const bar = document.createElement('div');
        bar.style.cssText =
          'background:#1c1c26;color:#888;font-size:0.8rem;padding:6px 2.5rem;' +
          'display:flex;justify-content:space-between;align-items:center;gap:1rem';
        bar.innerHTML =
          '<span>&#9888; Could not load movie info &mdash; player is still available above.</span>' +
          '<button onclick="this.parentElement.remove()" ' +
            'style="background:none;border:none;color:#888;cursor:pointer;font-size:1.1rem" ' +
            'aria-label="Dismiss">&#10005;</button>';
        document.getElementById('sourceBar').after(bar);
      }
    }
  }

  init();
</script>
</body>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  CINESTREAM AD BLOCKER
//  Blocks: popups, redirect hijacks, overlay ads, tab-under attacks,
//          focus theft, and known ad/tracker domains via fetch/XHR intercept.
// ════════════════════════════════════════════════════════════════════════════

(function() {
  'use strict';

  let blockedCount = 0;

  // ── Ad / tracker domain blocklist ────────────────────────────────────────
  const AD_DOMAINS = [
    'doubleclick','googlesyndication','adservice','adnxs','taboola','outbrain',
    'popads','popcash','propellerads','exoclick','trafficjunky','juicyads',
    'plugrush','adsterra','hilltopads','fuckingfast','realsrv','tsyndicate',
    'go.oclasrv','adclickxchange','ad-cdn','analytics','tracking','telemetry',
    'beacon','pixel.','spy.','stats.','counter.','clicksor','bidvertiser',
    'yllix','mgid','revcontent','zedo','yieldmo','openx','pubmatic','rubicon',
    'casalemedia','appnexus','33across','criteo','spotxchange','videostrip',
    'newssential','shsads','vsrv','vidazoo','justpremium','seedtag',
  ];

  function isDomainBlocked(url) {
    try {
      const host = new URL(url).hostname.toLowerCase();
      return AD_DOMAINS.some(d => host.includes(d));
    } catch { return false; }
  }

  // ── Toast ────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('adToast');
    if (!t) return;
    t.textContent = '🛡️ ' + msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function incrementBlocked(reason) {
    blockedCount++;
    const el = document.getElementById('adBlockCount');
    if (el) el.textContent = blockedCount;
    showToast(reason + ' blocked');
    console.log('[AdBlock]', reason, 'blocked. Total:', blockedCount);
  }

  // ── 1. Block window.open (popup ads) ────────────────────────────────────
  const _open = window.open.bind(window);
  window.open = function(url, target, features) {
    if (!url || url === 'about:blank') return null;
    if (isDomainBlocked(url)) {
      incrementBlocked('Popup');
      return null;
    }
    // Allow legitimate opens (e.g. same-origin modal windows)
    if (url && (url.startsWith('/') || url.startsWith(window.location.origin))) {
      return _open(url, target, features);
    }
    // Block everything else that isn't an explicit user action on a known-good URL
    incrementBlocked('Popup');
    return null;
  };

  // ── 2. Block fetch requests to ad domains ────────────────────────────────
  const _fetch = window.fetch;
  window.fetch = function(input, init) {
    const url = (typeof input === 'string') ? input : (input.url || '');
    if (isDomainBlocked(url)) {
      incrementBlocked('Network request');
      return Promise.reject(new Error('[AdBlock] Blocked: ' + url));
    }
    return _fetch.apply(this, arguments);
  };

  // ── 3. Block XMLHttpRequest to ad domains ────────────────────────────────
  const _XHROpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url) {
    if (typeof url === 'string' && isDomainBlocked(url)) {
      incrementBlocked('XHR request');
      this._blocked = true;
      return;
    }
    return _XHROpen.apply(this, arguments);
  };
  const _XHRSend = XMLHttpRequest.prototype.send;
  XMLHttpRequest.prototype.send = function() {
    if (this._blocked) return;
    return _XHRSend.apply(this, arguments);
  };

  // ── 4. Block tab-under / navigation hijack ───────────────────────────────
  // Tab-under: site opens a new tab to ads, then redirects the current tab
  let _lastUserAction = 0;
  document.addEventListener('mousedown', () => { _lastUserAction = Date.now(); }, true);
  document.addEventListener('touchstart', () => { _lastUserAction = Date.now(); }, true);

  const _locAssign   = window.location.assign.bind(window.location);
  const _locReplace  = window.location.replace.bind(window.location);

  Object.defineProperty(window, 'location', {
    get: () => window._realLocation || location,
    set: (v) => {
      if (typeof v === 'string' && isDomainBlocked(v)) {
        incrementBlocked('Redirect');
        return;
      }
      window._realLocation = v;
    },
    configurable: true,
  });

  // Block beforeunload triggered navigations from non-user actions
  window.addEventListener('beforeunload', (e) => {
    if (Date.now() - _lastUserAction > 1500) {
      e.preventDefault();
      e.returnValue = '';
      incrementBlocked('Page hijack');
    }
  });

  // ── 5. Block focus theft ─────────────────────────────────────────────────
  // Some ad scripts call window.focus() to steal focus back to an ad tab
  const _focus = window.focus;
  window.focus = function() {
    if (Date.now() - _lastUserAction > 800) {
      incrementBlocked('Focus theft');
      return;
    }
    return _focus.apply(this, arguments);
  };

  // ── 6. Remove injected ad overlay elements via MutationObserver ──────────
  const AD_SELECTORS = [
    // Generic overlay / interstitial patterns
    '[id*="ad-"]:not(#adToast):not(#adClickTrap)',
    '[id*="-ad"]:not(#adToast)',
    '[id*="ads-"]',
    '[id*="advert"]',
    '[class*="ad-overlay"]',
    '[class*="ad-container"]',
    '[class*="advert"]',
    '[class*="popup-ad"]',
    '[class*="interstitial"]',
    '[class*="sponsored"]',
    // Iframe overlays injected on top of the player
    'div[style*="position:fixed"][style*="z-index:99"]',
    'div[style*="position: fixed"][style*="z-index: 99"]',
    // Common ad iframe patterns
    'iframe[src*="doubleclick"]',
    'iframe[src*="googlesyndication"]',
    'iframe[src*="adnxs"]',
    'iframe[src*="popads"]',
  ];

  function sweepAds(root) {
    AD_SELECTORS.forEach(sel => {
      try {
        root.querySelectorAll(sel).forEach(el => {
          // Never remove the player iframe itself
          if (el.id === 'playerIframe' || el.id === 'playerWrap') return;
          el.remove();
          incrementBlocked('Overlay element');
        });
      } catch(_) {}
    });
  }

  // Run on DOM changes
  const observer = new MutationObserver(mutations => {
    mutations.forEach(m => {
      m.addedNodes.forEach(node => {
        if (node.nodeType !== 1) return;
        // Check the node itself
        AD_SELECTORS.forEach(sel => {
          try {
            if (node.matches && node.matches(sel) &&
                node.id !== 'playerIframe' && node.id !== 'playerWrap') {
              node.remove();
              incrementBlocked('Injected element');
            }
          } catch(_) {}
        });
        // Check children
        if (node.querySelectorAll) sweepAds(node);
      });
    });
  });

  document.addEventListener('DOMContentLoaded', () => {
    observer.observe(document.body, { childList: true, subtree: true });
    sweepAds(document);
  });

  // ── 7. Click trap handler on top of the player iframe ────────────────────
  // The trap div sits over the iframe. On first click we pass the click through
  // (so the player starts), then hide the trap. Any subsequent programmatic
  // click or synthetic click that tries to open an ad is swallowed.
  window.handlePlayerClick = function(e) {
    // Forward the click to the iframe by briefly hiding the trap
    const trap = document.getElementById('adClickTrap');
    if (trap) trap.style.display = 'none';
    // Re-enable trap after a moment to catch future ad click-hijacks
    setTimeout(() => {
      if (trap) trap.style.display = 'block';
    }, 800);
  };

  // ── 8. Audio boost (carry-over feature) ──────────────────────────────────
  window.addEventListener('load', () => {
    document.body.addEventListener('click', () => {
      try {
        const media = document.getElementById('playerIframe');
        if (!media) return;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(media);
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 2.5;
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
      } catch(_) { /* Cross-origin iframes can't be boosted — silently skip */ }
    }, { once: true });
  });

  console.log('[CineStream] 🛡️ Ad Blocker active');
})();
</script>
